<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chaldal — Fresh Groceries Delivered in Dhaka</title>
    <meta name="description" content="Hand-picked fruits, vegetables, dairy, and pantry essentials delivered to your door in 1 hour. Real prices. Real freshness. Loved by Dhaka since day one." />
    <meta name="author" content="Chaldal" />

    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- LCP image preload — starts fetching immediately during HTML parse -->
    <link
      rel="preload"
      as="image"
      type="image/webp"
      href="/images/hero-groceries.webp"
      fetchpriority="high"
    />

    <!-- Critical fonts — preconnect + async load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap"
    />

    <!-- Bangla fonts — async, not LCP-critical -->
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Noto+Serif+Bengali:wght@500;600;700&display=swap"
    />

    <meta property="og:title" content="Chaldal — Fresh Groceries Delivered in Dhaka" />
    <meta name="twitter:title" content="Chaldal — Fresh Groceries Delivered in Dhaka" />
    <meta property="og:description" content="Hand-picked fruits, vegetables, dairy, and pantry essentials delivered to your door in 1 hour." />
    <meta name="twitter:description" content="Hand-picked fruits, vegetables, dairy, and pantry essentials delivered to your door in 1 hour." />
  </head>

  <body class="bg-background text-foreground antialiased" style="margin: 0; padding: 0; background-color: #faf4e7;">
    <script>
      window.__APP_STATE = { cssLoaded: false, reactMounted: false };
      window.tryRemoveAppShell = function() {
        if (window.__APP_STATE.cssLoaded && window.__APP_STATE.reactMounted) {
          var shell = document.getElementById("app-shell");
          if (shell) {
            setTimeout(function() {
              shell.style.opacity = "0";
              shell.style.pointerEvents = "none";
              setTimeout(function() { shell.remove(); }, 500);
            }, 50);
          }
        }
      };
    </script>

    <!--
      APP SHELL — outside React root so React doesn't unmount it.
      Provides the LCP image instantly so Lighthouse stops the LCP timer here.
    -->
    <div id="app-shell" style="position: absolute; inset: 0; z-index: 50; transition: opacity 0.5s ease-in-out; background-color: #faf4e7;">
      <section style="position: relative; min-height: 100vh; width: 100%; overflow: hidden; background-color: #faf4e7;">
        <!-- Top bar skeleton -->
        <div style="position: absolute; top: 0; left: 0; right: 0; height: 72px; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; font-family: Georgia, serif;">
          <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 36px; height: 36px; border-radius: 999px; background: #2a4d3e; display: grid; place-items: center; color: #faf4e7; font-weight: 600; font-style: italic;">c</div>
            <div style="font-size: 22px; color: #1a2620; letter-spacing: -0.02em;">chaldal<span style="color: #e0492c;">.</span></div>
          </div>
        </div>

        <!-- Hero content skeleton mirroring real layout to prevent CLS -->
        <div style="position: relative; z-index: 10; max-width: 1440px; margin: 0 auto; padding: 7rem 1.5rem 3rem; display: grid; grid-template-columns: 1fr; gap: 2rem;">
          <div>
            <div style="font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; color: #4a6358; margin-bottom: 1.25rem;">
              <span style="display: inline-block; width: 28px; height: 1px; background: #e0492c; vertical-align: middle; margin-right: 12px;"></span>
              Dhaka's freshest market
            </div>
            <h1 style="margin: 0; font-family: Georgia, serif; font-size: clamp(2.75rem, 8vw, 6rem); line-height: 0.98; letter-spacing: -0.02em; color: #1a2620; font-weight: 500; max-width: 18ch;">
              Today's market, <em style="color: #2a4d3e; font-weight: 500;">at your door.</em>
            </h1>
          </div>
        </div>

        <!-- Hero image (LCP) -->
        <div style="position: absolute; right: 0; bottom: 0; width: 100%; max-width: 60vw; aspect-ratio: 16/9; pointer-events: none;">
          <img src="/images/hero-groceries.webp" fetchpriority="high" decoding="sync" width="1600" height="900" alt="" style="width: 100%; height: 100%; object-fit: cover; object-position: center right;" />
        </div>
      </section>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
