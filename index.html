<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chaldal — Fresh Groceries Delivered in Dhaka</title>
    <meta name="description" content="Hand-picked fruits, vegetables, dairy, and pantry essentials delivered to your door in 1 hour. Real prices. Real freshness. Loved by Dhaka since day one.">
    <meta name="author" content="Chaldal" />

    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- LCP image preload — responsive: 480w on small phones (~19 KB),
         960w on tablets, 1920w on desktop. Slow 4G picks 480w → paints on first frame. -->
    <link
      rel="preload"
      as="image"
      type="image/webp"
      href="/images/hero-market-480.webp"
      imagesrcset="/images/hero-market-480.webp 480w, /images/hero-market-960.webp 960w, /images/hero-market.webp 1920w"
      imagesizes="(max-width: 640px) 100vw, (max-width: 1024px) 100vw, 60vw"
      fetchpriority="high"
    />

    <!-- Critical fonts — preconnect + async load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap"
    />

    <!-- Bangla fonts — async, not LCP-critical -->
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Noto+Serif+Bengali:wght@500;600;700&display=swap"
    />

    
    
    
    
    <meta property="og:title" content="Chaldal — Fresh Groceries Delivered in Dhaka">
  <meta name="twitter:title" content="Chaldal — Fresh Groceries Delivered in Dhaka">
  <meta property="og:description" content="Hand-picked fruits, vegetables, dairy, and pantry essentials delivered to your door in 1 hour. Real prices. Real freshness. Loved by Dhaka since day one.">
  <meta name="twitter:description" content="Hand-picked fruits, vegetables, dairy, and pantry essentials delivered to your door in 1 hour. Real prices. Real freshness. Loved by Dhaka since day one.">
  <meta property="og:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/3d0d4cbd-cf0b-455d-874e-7d629f8c94d6/id-preview-d18d3d55--8c725c51-af6e-43a8-bd29-6d29f00c3d63.lovable.app-1777003556089.png">
  <meta name="twitter:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/3d0d4cbd-cf0b-455d-874e-7d629f8c94d6/id-preview-d18d3d55--8c725c51-af6e-43a8-bd29-6d29f00c3d63.lovable.app-1777003556089.png">
</head>

  <body class="bg-background text-foreground antialiased" style="margin: 0; padding: 0; background-color: #1a1a1a;">
    <script>
      window.__APP_STATE = { cssLoaded: false, reactMounted: false };
      window.tryRemoveAppShell = function() {
        if (window.__APP_STATE.cssLoaded && window.__APP_STATE.reactMounted) {
          var shell = document.getElementById("app-shell");
          if (shell) {
            shell.style.opacity = "0";
            setTimeout(function() { shell.remove(); }, 250);
          }
        }
      };
    </script>

    <!--
      APP SHELL — outside React root so React doesn't unmount it.
      Mirrors the split-color hero layout so the LCP image paints instantly
      and there is zero CLS when React hydrates.
    -->
    <style>
      #app-shell-grid { display: grid; grid-template-columns: 1fr; min-height: 100vh; width: 100%; }
      #app-shell-left { background-color: #d63a23; color: #faf4e7; padding: 6rem 1.5rem 2.5rem; display: flex; flex-direction: column; justify-content: space-between; font-family: Inter, system-ui, sans-serif; min-height: 40vh; }
      #app-shell-right {
        position: relative; width: 100%; min-height: 60vh; overflow: hidden;
        /* LQIP — 388-byte blurred preview painted on first frame so the right
           panel never appears empty while the WebP downloads. */
        background-image: url("data:image/jpeg;base64,/9j/2wBDABQODxIPDRQSEBIXFRQYHjIhHhwcHj0sLiQySUBMS0dARkVQWnNiUFVtVkVGZIhlbXd7gYKBTmCNl4x9lnN+gXz/2wBDARUXFx4aHjshITt8U0ZTfHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHz/wAARCAAOABgDASIAAhEBAxEB/8QAFwAAAwEAAAAAAAAAAAAAAAAAAAQFAv/EACUQAAEDAwMDBQAAAAAAAAAAAAECAxEABDESISIFMkETFCNhof/EABYBAQEBAAAAAAAAAAAAAAAAAAMCBP/EABkRAQEBAQEBAAAAAAAAAAAAAAECAAMREv/aAAwDAQACEQMRAD8AlLd4pS3JJjGa2y6VadQVpycE5+sUy1eNXHSCp5r5rUpRrA70nwanIebQsqW36jZnSDsQT5JGazMpr5Ei/Wc6khVvcuNO7BCuEzyB38UVI9wtTgnuiAZnOfzaikYMk9qk8N//2Q==");
        background-size: cover; background-position: center;
      }
      @media (min-width: 1024px) {
        #app-shell-grid { grid-template-columns: minmax(0, 520px) 1fr; }
        #app-shell-left { padding: 8rem 3.5rem 2.5rem; min-height: 100vh; }
        #app-shell-right { min-height: 100vh; }
      }
    </style>
    <!--
      APP SHELL — mirrors the React Hero layout but stays non-interactive so
      scrolling works immediately while the real app hydrates underneath.
    -->
    <div id="app-shell" style="position: absolute; inset: 0; z-index: 50; transition: opacity 0.25s ease-out; pointer-events: none;">
      <div id="app-shell-grid">
        <div id="app-shell-left">
          <div style="font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; opacity: 0.75;">Est. 2013 · Dhaka</div>
          <h1 style="margin: 0; font-family: Inter, system-ui, sans-serif; font-weight: 700; text-transform: uppercase; font-size: clamp(2.25rem, 5vw, 3.75rem); line-height: 0.86; letter-spacing: -0.04em;">
            <span style="display: block;">Grocery</span>
            <span style="display: block; color: #f5c971;">Delivered at</span>
            <span style="display: block;">your Doorstep</span>
          </h1>
          <div style="font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; opacity: 0.65;">Where should we deliver?</div>
        </div>

        <div id="app-shell-right">
          <img src="/images/hero-market-480.webp" srcset="/images/hero-market-480.webp 480w, /images/hero-market-960.webp 960w, /images/hero-market.webp 1920w" sizes="(max-width: 640px) 100vw, (max-width: 1024px) 100vw, 60vw" fetchpriority="high" decoding="async" width="1920" height="1280" alt="" style="width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0;" />
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
