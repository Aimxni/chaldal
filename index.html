<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chaldal — Fresh Groceries Delivered in Dhaka</title>
    <meta name="description" content="Hand-picked fruits, vegetables, dairy, and pantry essentials delivered to your door in 1 hour. Real prices. Real freshness. Loved by Dhaka since day one." />
    <meta name="author" content="Chaldal" />

    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- LCP image preload — responsive: pulls 960w on mobile, 1920w on desktop -->
    <link
      rel="preload"
      as="image"
      type="image/webp"
      href="/images/hero-market.webp"
      imagesrcset="/images/hero-market-960.webp 960w, /images/hero-market.webp 1920w"
      imagesizes="(max-width: 1024px) 100vw, 60vw"
      fetchpriority="high"
    />

    <!-- Critical fonts — preconnect + async load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap"
    />

    <!-- Bangla fonts — async, not LCP-critical -->
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Noto+Serif+Bengali:wght@500;600;700&display=swap"
    />

    <meta property="og:title" content="Chaldal — Fresh Groceries Delivered in Dhaka" />
    <meta name="twitter:title" content="Chaldal — Fresh Groceries Delivered in Dhaka" />
    <meta property="og:description" content="Hand-picked fruits, vegetables, dairy, and pantry essentials delivered to your door in 1 hour." />
    <meta name="twitter:description" content="Hand-picked fruits, vegetables, dairy, and pantry essentials delivered to your door in 1 hour." />
  </head>

  <body class="bg-background text-foreground antialiased" style="margin: 0; padding: 0; background-color: #d63a23;">
    <script>
      window.__APP_STATE = { cssLoaded: false, reactMounted: false };
      window.tryRemoveAppShell = function() {
        if (window.__APP_STATE.cssLoaded && window.__APP_STATE.reactMounted) {
          var shell = document.getElementById("app-shell");
          if (shell) {
            setTimeout(function() {
              shell.style.opacity = "0";
              shell.style.pointerEvents = "none";
              setTimeout(function() { shell.remove(); }, 500);
            }, 50);
          }
        }
      };
    </script>

    <!--
      APP SHELL — outside React root so React doesn't unmount it.
      Mirrors the split-color hero layout so the LCP image paints instantly
      and there is zero CLS when React hydrates.
    -->
    <div id="app-shell" style="position: absolute; inset: 0; z-index: 50; transition: opacity 0.5s ease-in-out; background-color: #d63a23;">
      <div style="display: grid; grid-template-columns: 1fr; min-height: 100vh; width: 100%; background-color: #d63a23;">
        <!-- Right panel image — appears as full-width on mobile, on the right on desktop.
             Background stays tomato red so the page reads as red instantly,
             even before the hero image has finished downloading. -->
        <div style="position: relative; width: 100%; min-height: 60vh; overflow: hidden; background-color: #d63a23;">
          <img src="/images/hero-market.webp" srcset="/images/hero-market-960.webp 960w, /images/hero-market.webp 1920w" sizes="(max-width: 1024px) 100vw, 60vw" fetchpriority="high" decoding="async" width="1920" height="1280" alt="" style="width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; opacity: 0; transition: opacity 0.4s ease-out;" onload="this.style.opacity='1'" />
        </div>
      </div>

      <!-- Left red sidebar text skeleton (visible on top so the LCP h1 paints instantly) -->
      <div style="position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 6rem 1.5rem 2.5rem; color: #faf4e7; font-family: Inter, system-ui, sans-serif; pointer-events: none;">
        <div style="font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; opacity: 0.75;">Est. 2013 · Dhaka</div>
        <h1 style="margin: 0; font-family: Inter, system-ui, sans-serif; font-weight: 700; text-transform: uppercase; font-size: clamp(3rem, 11vw, 7.5rem); line-height: 0.86; letter-spacing: -0.04em;">
          <span style="display: block;">Real food.</span>
          <span style="display: block; color: #f5c971;">Real fast.</span>
          <span style="display: block;">Real cheap.</span>
        </h1>
        <div style="font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; opacity: 0.65;">Where should we deliver?</div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
